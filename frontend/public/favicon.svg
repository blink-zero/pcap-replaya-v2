<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PCAP Replaya">
  <defs>
    <linearGradient id="pr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="pr-play" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <rect width="64" height="64" rx="14" fill="url(#pr-bg)"/>
  <!-- Capture ring: dashed arc evoking a cyclic packet capture -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.25" stroke-dasharray="2.5 3"/>
  <!-- Play triangle: the core "replay" motif, gently rounded -->
  <path d="M25 19.5 L47 32 L25 44.5 Z"
        fill="url(#pr-play)"
        stroke="#ffffff"
        stroke-opacity="0.15"
        stroke-linejoin="round"
        stroke-width="0.75"/>
  <!-- Pulse dot: suggests "live signal" -->
  <circle cx="48" cy="16" r="2.5" fill="#ffffff"/>
  <circle cx="48" cy="16" r="4" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
</svg>
